<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PipoStudy — {% block title %}Início{% endblock %}</title>
    <style>
        :root {
            --bg: #f8f5ff; --sidebar: #fff; --card: #fff;
            --item: #faf8ff; --ativo: #ede9fe; --texto: #1e1233;
            --muted: #9b7fc0; --roxa: #7c3aed; --roxa-h: #6d28d9;
            --verde: #0f6e56; --vermelha: #ef4444; --amarelo: #f59e0b;
            --bg-verde: #e0f5ee; --bg-verm: #fde8e8; --bg-amar: #fef3e2;
            --border: #f0eaf9;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--texto); min-height:100vh; }

        /* Layout */
        .app { display:flex; min-height:100vh; }
        .sidebar { width:220px; background:var(--sidebar); border-right:1px solid var(--border); padding:20px 14px; display:flex; flex-direction:column; position:fixed; height:100vh; }
        .main { flex:1; margin-left:220px; padding:28px 32px; }

        /* Sidebar */
        .logo { display:flex; align-items:center; gap:10px; padding:4px 8px 20px; }
        .logo-icon { width:36px; height:36px; background:var(--roxa); border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; }
        .logo-text { font-size:14px; font-weight:600; }
        .logo-sub { font-size:8px; color:var(--muted); letter-spacing:1px; }
        .nav-section { font-size:9px; color:var(--muted); letter-spacing:1px; padding:0 10px; margin:12px 0 4px; }
        .nav-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px; color:var(--muted); text-decoration:none; font-size:13px; margin-bottom:2px; transition:.2s; }
        .nav-item:hover { background:var(--ativo); }
        .nav-item.active { background:var(--roxa); color:#fff; font-weight:600; }
        .badge { background:#ef4444; color:#fff; font-size:9px; padding:2px 7px; border-radius:8px; margin-left:auto; }
        .sidebar-footer { margin-top:auto; background:var(--item); border-radius:10px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--muted); }
        .sidebar-footer strong { color:var(--texto); }

        /* Cards de resumo */
        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
        .stat-card { background:var(--card); border-radius:14px; padding:16px; display:flex; align-items:center; gap:12px; border:1px solid var(--border); }
        .stat-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .stat-icon.purple { background:var(--ativo); }
        .stat-icon.red { background:var(--bg-verm); }
        .stat-icon.blue { background:#e8f0fe; }
        .stat-icon.amber { background:var(--bg-amar); }
        .stat-val { font-size:22px; font-weight:600; }
        .stat-label { font-size:10px; color:var(--muted); }

        /* Content grid */
        .content-grid { display:grid; grid-template-columns:1fr 260px; gap:14px; }
        .panel { background:var(--card); border-radius:14px; padding:18px; border:1px solid var(--border); }
        .panel-title { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
        .right-col { display:flex; flex-direction:column; gap:12px; }

        /* Revisão items */
        .rev-item { display:flex; align-items:center; gap:10px; padding:10px; background:var(--item); border-radius:10px; margin-bottom:6px; }
        .rev-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; }
        .rev-info { flex:1; min-width:0; }
        .rev-title { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .rev-sub { font-size:10px; color:var(--muted); }
        .tag { font-size:9px; font-weight:600; padding:3px 8px; border-radius:5px; }
        .tag-hoje { background:var(--bg-verde); color:var(--verde); }
        .tag-atrasada { background:var(--bg-verm); color:#dc2626; }

        /* Buttons */
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-size:13px; font-weight:600; text-decoration:none; transition:.2s; }
        .btn-primary { background:var(--roxa); color:#fff; width:100%; }
        .btn-primary:hover { background:var(--roxa-h); }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted); }
        .btn-sm { padding:6px 14px; font-size:11px; border-radius:8px; }
        .btn-danger { background:var(--bg-verm); color:#dc2626; }

        /* Forms */
        .form-card { max-width:460px; margin:0 auto; background:var(--card); border-radius:16px; padding:32px; border:1px solid var(--border); }
        .form-title { text-align:center; font-size:22px; font-weight:600; margin-bottom:4px; }
        .form-sub { text-align:center; font-size:12px; color:var(--muted); margin-bottom:24px; }
        label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:4px; }
        input, select, textarea { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:var(--item); color:var(--texto); font-size:13px; margin-bottom:16px; font-family:inherit; }
        input:focus, select:focus, textarea:focus { outline:none; border-color:var(--roxa); }
        textarea { resize:vertical; min-height:70px; }

        /* Review page */
        .review-card { max-width:700px; margin:0 auto; background:var(--card); border-radius:16px; padding:32px; border:1px solid var(--border); }
        .review-tags { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .review-tag { font-size:11px; padding:4px 10px; border-radius:8px; }
        .review-tag.materia { background:var(--ativo); color:var(--roxa); }
        .review-tag.info { background:var(--item); color:var(--muted); }
        .review-subject { font-size:26px; font-weight:600; margin-bottom:16px; }
        .review-note { background:var(--item); border-radius:12px; padding:16px; font-size:13px; color:var(--texto); margin-bottom:20px; }
        .feedback-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
        .fb-btn { display:flex; flex-direction:column; align-items:center; padding:16px; border-radius:12px; text-decoration:none; border:none; cursor:pointer; transition:.2s; }
        .fb-btn:hover { transform:translateY(-2px); }
        .fb-icon { font-size:20px; margin-bottom:4px; }
        .fb-title { font-size:12px; font-weight:600; }
        .fb-sub { font-size:10px; color:var(--muted); }
        .fb-green { background:var(--bg-verde); color:var(--verde); }
        .fb-yellow { background:var(--bg-amar); color:#b45309; }
        .fb-red { background:var(--bg-verm); color:#dc2626; }

        /* Próximas */
        .prox-item { display:flex; align-items:center; gap:8px; padding:6px 0; }
        .prox-item + .prox-item { border-top:1px solid var(--border); }
        .prox-dot { width:6px; height:6px; border-radius:50%; background:var(--roxa); }
        .prox-info { flex:1; }
        .prox-title { font-size:11px; font-weight:600; }
        .prox-sub { font-size:9px; color:var(--muted); }
        .prox-days { font-size:10px; color:var(--amarelo); font-weight:600; }

        /* Empty state */
        .empty { text-align:center; padding:32px; color:var(--muted); font-size:14px; }

        /* Grid assuntos */
        .assuntos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
        .assunto-card { background:var(--card); border-radius:14px; padding:16px; border:1px solid var(--border); }
        .assunto-card.atrasado { border-color:#dc2626; }
        .assunto-card.hoje { border-color:var(--verde); }

        /* Responsive */
        @media(max-width:900px) {
            .sidebar { display:none; }
            .main { margin-left:0; }
            .stats { grid-template-columns:repeat(2,1fr); }
            .content-grid { grid-template-columns:1fr; }
            .feedback-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="app">
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon">⬡</div>
            <div><div class="logo-text">PipoStudy</div><div class="logo-sub">SPACED REPETITION</div></div>
        </div>
        <div class="nav-section">PRINCIPAL</div>
        <a href="{{ url_for('index') }}" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">⊞ Início</a>
        <a href="{{ url_for('revisar') }}" class="nav-item {% if request.endpoint == 'revisar' %}active{% endif %}">↻ Revisar
            {% if fila is defined and fila|length > 0 %}<span class="badge">{{ fila|length }}</span>{% endif %}
        </a>
        <div class="nav-section">OUTROS</div>
        <a href="{{ url_for('cadastrar') }}" class="nav-item {% if request.endpoint == 'cadastrar' %}active{% endif %}">+ Cadastrar</a>
        <div class="sidebar-footer">
            <span>Total de assuntos</span>
            <strong>{{ total if total is defined else 0 }}</strong>
        </div>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
